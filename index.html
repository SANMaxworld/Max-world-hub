<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW Hub | Max World</title>
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-section">
            <img src="assets/logo.jpg" alt="MW Hub Logo" class="main-logo">
            <h1 class="brand-name">MW <span style="color:#ffcc00; text-shadow: 0 0 10px #ffcc00;">HUB</span></h1>
        </div>
    </header>

    <div class="glass-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Apps, Games, Movies...">
        </div>

        <div class="grid-menu">
            <a href="games.html" class="menu-item" id="nav-games">
                <span class="icon">🎮</span>
                <span>GAMES</span>
            </a>
            <a href="apps.html" class="menu-item" id="nav-apps">
                <span class="icon">📱</span>
                <span>APPS</span>
            </a>
            <a href="movies.html" class="menu-item" id="nav-movies">
                <span class="icon">🎬</span>
                <span>MOVIES</span>
            </a>
            <a href="pdf.html" class="menu-item" id="nav-pdf">
                <span class="icon">📄</span>
                <span>PDF</span>
            </a>
        </div>

        <div class="welcome-text" style="text-align:center; margin-top:20px; color:#aaa; font-size:0.9rem;">
            Welcome to <b>Max World Digital Hub</b>. Explore our curated collection.
        </div>
    </div>

    <footer>
        <p style="color:#666; font-size: 0.8rem; text-align:center; margin-top:20px;">
            © 2026 Max World (MW Hub). All Rights Reserved.
        </p>
    </footer>

    <script src="data.js"></script>
    <script>
        // Original JS function for search and dynamic behavior can be added here if needed,
        // but since index.html is just navigation, no complex JS is required.
    </script>
</body>
</html>
