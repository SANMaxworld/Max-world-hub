<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW Hub | Max World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="star-container">
        <div class="star" style="top: 10%; animation-delay: 0s;"></div>
        <div class="star" style="top: 30%; animation-delay: 1.5s;"></div>
        <div class="star" style="top: 50%; animation-delay: 0.8s;"></div>
        <div class="star" style="top: 70%; animation-delay: 2.2s;"></div>
    </div>

    <header>
        <div class="logo-section">
            <img src="assets/logo.png" alt="MW" class="main-logo">
            <h1 class="brand-name">MAX WORLD <span style="color:#007bff; text-shadow: 0 0 10px #007bff;">HUB</span></h1>
        </div>
    </header>

    <div class="glass-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search premium assets...">

        <div class="grid-container">
            <a href="#resultContainer" class="nav-btn">🎮 GAMES</a>
            <a href="#resultContainer" class="nav-btn">📱 APPS</a>
            <a href="#resultContainer" class="nav-btn">🎬 MOVIES</a>
            <a href="#resultContainer" class="nav-btn">📄 PDF</a>
        </div>

        <div id="resultContainer" style="margin-top:20px;"></div>

        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:30px 0;">

        <div class="about-box">
            <h3 style="color:#007bff; margin-bottom:10px;">About Max World Hub</h3>
            <p style="font-size:0.9rem; color:#ccc;">Welcome to <b>MW Hub</b>. Note: All files are in <b>ZIP format</b>. Extract after download!</p>
        </div>
    </div>

    <footer style="text-align:center; padding:30px; font-size:0.8rem; color:#666;">
        © 2026 Max World (MW Hub). All Rights Reserved.
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
