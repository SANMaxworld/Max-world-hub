<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Series Hub | MW Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-section">
            <img src="assets/logo.png" class="main-logo">
            <h1 class="brand-name">ANIME <span class="neon-red-text">SERIES</span></h1>
        </div>
    </header>

    <div class="glass-container">
        <h2 style="text-align:center; margin-bottom:15px; font-size:1rem; color:#ff0000;">Search Your Favorite Anime</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="Search Only Anime Series...">
        
        <div id="resultContainer"></div>

        <p style="text-align:center; color:#666; font-size:0.8rem; margin-top:20px;">
            Tip: Click 'VIEW' to see all episodes and season details.
        </p>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
