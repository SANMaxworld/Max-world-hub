<script src="data.js"></script>
<script>
    const appsContainer = document.getElementById('appsList');
    
    // STRICT FILTER: Sirf wahi dikhao jinka category APPS hai
    const appsData = mwHubData.filter(item => item.category.trim() === "APPS");

    appsContainer.innerHTML = ''; // Pehle purana kachra saaf karo

    if (appsData.length === 0) {
        appsContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#888;"><p>🚀 Coming Soon!</p></div>';
    } else {
        appsData.forEach(item => {
            const card = document.createElement('div');
            card.style.cssText = "background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid rgba(255,255,255,0.1);";
            card.innerHTML = `
                <img src="${item.logo}" style="width:55px; height:55px; border-radius:12px; object-fit:cover;">
                <div style="flex:1;">
                    <h4 style="font-size:1rem; color:#fff;">${item.name}</h4>
                    <p style="font-size:0.8rem; color:#aaa;">${item.desc}</p>
                </div>
                <a href="${item.url}" target="_blank" style="background:#007bff; color:#fff; padding:10px 18px; border-radius:10px; text-decoration:none; font-weight:700;">GET</a>
            `;
            appsContainer.appendChild(card);
        });
    }
</script>
