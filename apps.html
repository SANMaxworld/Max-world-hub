<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Section | MW Hub</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none; color:white; display:flex; align-items:center; gap:15px;">
                <img src="assets/logo.jpg" alt="MW Hub" class="main-logo">
                <h1 class="brand-name">APPS <span style="color:#007bff; text-shadow: 0 0 10px #007bff;">SECTION</span></h1>
            </a>
        </div>
    </header>

    <div class="glass-container">
        <div id="appsList">
            </div>

        <a href="index.html" class="nav-btn" style="display:block; margin-top:30px; background:#333; text-align:center; font-size:0.9rem;">
            ⬅️ BACK TO HOME
        </a>
    </div>

    <footer>
        <p style="color:#666; font-size: 0.8rem; text-align:center; margin-top:20px;">
            © 2026 Max World (MW Hub). All Rights Reserved.
        </p>
    </footer>

    <script src="data.js"></script>
    <script>
        // Check if mwHubData exists to prevent white screen
        if (typeof mwHubData !== 'undefined') {
            const appsContainer = document.getElementById('appsList');
            
            // STRICT FILTER
            const appsData = mwHubData.filter(item => item.category.trim() === "APPS");

            appsContainer.innerHTML = ''; 

            if (appsData.length === 0) {
                appsContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#888;"><p>🚀 Coming Soon!</p></div>';
            } else {
                appsData.forEach(item => {
                    const card = document.createElement('div');
                    card.style.cssText = "background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid rgba(255,255,255,0.1);";
                    card.innerHTML = `
                        <img src="${item.logo}" style="width:55px; height:55px; border-radius:12px; object-fit:cover;">
                        <div style="flex:1;">
                            <h4 style="font-size:1rem; color:#fff;">${item.name}</h4>
                            <p style="font-size:0.8rem; color:#aaa;">${item.desc}</p>
                        </div>
                        <a href="${item.url}" target="_blank" style="background:#007bff; color:#fff; padding:10px 18px; border-radius:10px; text-decoration:none; font-weight:700;">GET</a>
                    `;
                    appsContainer.appendChild(card);
                });
            }
        } else {
            console.error("data.js not found or empty!");
        }
    </script>
</body>
</html>
