<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Section | MW Hub</title>
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none; color:white; display:flex; align-items:center; gap:15px;">
                <img src="assets/logo.jpg" alt="MW Hub" class="main-logo">
                <h1 class="brand-name">PDF <span style="color:#28a745; text-shadow: 0 0 10px #28a745;">DOCUMENTS</span></h1>
            </a>
        </div>
    </header>

    <div class="glass-container">
        <div id="pdfList">
            </div>

        <a href="index.html" class="nav-btn" style="display:block; margin-top:30px; background:#333; text-align:center; font-size:0.9rem;">
            ⬅️ BACK TO HOME
        </a>
    </div>

    <footer>
        <p style="color:#666; font-size: 0.8rem; text-align:center; margin-top:20px;">
            © 2026 Max World (MW Hub). All Rights Reserved.
        </p>
    </footer>

    <script src="data.js"></script>
    <script>
        const pdfContainer = document.getElementById('pdfList');
        
        // Filter only 'PDF' from mwHubData
        const pdfData = mwHubData.filter(item => item.category === "PDF");

        if (pdfData.length === 0) {
            pdfContainer.innerHTML = `
                <div style="text-align:center; padding:40px; color:#888;">
                    <p style="font-size:1.2rem;">📚 Coming Soon!</p>
                    <p style="font-size:0.8rem;">Educational PDFs and important documents are being uploaded.</p>
                </div>`;
        } else {
            pdfData.forEach(item => {
                const card = document.createElement('div');
                // Document Style Card with Green Glow
                card.style.cssText = "background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid rgba(40,167,69,0.2); animation: fadeIn 0.5s ease-in-out;";
                
                card.innerHTML = `
                    <img src="${item.logo}" alt="pdf icon" style="width:50px; height:50px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); object-fit:cover;">
                    <div style="flex:1;">
                        <h4 style="margin-bottom:3px; font-size:1rem; color:#fff;">${item.name}</h4>
                        <p style="font-size:0.8rem; color:#aaa; line-height:1.4;">${item.desc}</p>
                    </div>
                    <a href="${item.url}" target="_blank" style="background:#28a745; color:#fff; padding:10px 18px; border-radius:10px; text-decoration:none; font-weight:700; font-size:0.85rem; box-shadow: 0 4px 15px rgba(40,167,69,0.3);">
                        VIEW
                    </a>
                `;
                pdfContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
