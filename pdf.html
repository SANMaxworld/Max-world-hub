<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Section | MW Hub - Educational Resources</title>
    <meta name="description" content="Access important educational PDFs, study notes, and documents at MW Hub PDF Section. Your personal digital library.">
    <meta name="keywords" content="MW Hub PDF, Study Materials, Education Docs, PDF Download MW Hub">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none; color:white; display:flex; align-items:center; gap:15px;">
                <img src="assets/logo.jpg" alt="MW Hub" class="main-logo">
                <h1 class="brand-name">PDF <span style="color:#28a745; text-shadow: 0 0 10px #28a745;">SECTION</span></h1>
            </a>
        </div>
    </header>
    <div class="glass-container">
        <div id="pdfList"></div>
        <a href="index.html" class="nav-btn" style="display:block; margin-top:30px; background:#333; text-align:center; font-size:0.9rem;">⬅️ BACK TO HOME</a>
    </div>
    <script src="data.js"></script>
    <script>
        if (typeof mwHubData !== 'undefined') {
            const pdfContainer = document.getElementById('pdfList');
            const pdfData = mwHubData.filter(item => item.category.trim() === "PDF");
            pdfContainer.innerHTML = '';
            if (pdfData.length === 0) {
                pdfContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#888;"><p>📄 Coming Soon!</p></div>';
            } else {
                pdfData.forEach(item => {
                    const card = document.createElement('div');
                    card.style.cssText = "background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid rgba(40,167,69,0.1);";
                    card.innerHTML = `
                        <img src="${item.logo}" style="width:50px; height:50px; border-radius:8px; object-fit:contain;">
                        <div style="flex:1;"><h4 style="color:#fff;">${item.name}</h4><p style="font-size:0.8rem; color:#aaa;">${item.desc}</p></div>
                        <a href="${item.url}" target="_blank" style="background:#28a745; color:#fff; padding:10px 18px; border-radius:10px; text-decoration:none; font-weight:700;">OPEN</a>`;
                    pdfContainer.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>
