<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Games Section - MW Hub</title>
</head>
<body>
    <header>
        <div class="logo-section">
            <a href="index.html" style="text-decoration:none; color:white; display:flex; align-items:center; gap:15px;">
                <img src="assets/logo.jpg" alt="MW Hub" class="main-logo">
                <h1 class="brand-name">GAMES <span style="color:#007bff;">SECTION</span></h1>
            </a>
        </div>
    </header>
    <div class="glass-container">
        <div id="categoryList"></div>
        <a href="index.html" class="nav-btn" style="display:block; margin-top:30px; background:#333;">⬅️ BACK TO HOME</a>
    </div>
    <script src="data.js"></script>
    <script>
        const container = document.getElementById('categoryList');
        const filtered = mwHubData.filter(item => item.category === "GAMES");
        if (filtered.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">Coming Soon: Exciting games are on the way!</p>';
        } else {
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.style.cssText = "background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid rgba(255,255,255,0.1);";
                div.innerHTML = `<img src="${item.logo}" style="width:55px; height:55px; border-radius:10px;"><div style="flex:1;"><h4 style="font-size:0.95rem;">${item.name}</h4><p style="font-size:0.8rem; color:#aaa;">${item.desc}</p></div><a href="${item.url}" target="_blank" style="background:#007bff; color:#fff; padding:8px 15px; border-radius:8px; text-decoration:none; font-weight:700;">GET</a>`;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
